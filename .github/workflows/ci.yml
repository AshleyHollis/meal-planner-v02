name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package.json
      - name: Install web dependencies
        run: npm install --prefix apps/web
      - name: Lint web
        run: npm --prefix apps/web run lint
      - name: Typecheck web
        run: npm --prefix apps/web run typecheck
      - name: Build web
        run: npm --prefix apps/web run build

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./apps/api[dev] -e ./apps/worker[dev]
      - name: Test API
        run: python -m pytest apps/api/tests
      - name: Test worker
        run: python -m pytest apps/worker/tests

  apphost:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore AppHost
        run: dotnet restore apps/apphost/MealPlanner.AppHost.csproj
      - name: Build AppHost
        run: dotnet build apps/apphost/MealPlanner.AppHost.csproj --no-restore
